<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="stylesheet" href="styles.css">
       <script src="js.js"></script>
        <title>
            PracitcaPlus
        </title>
    </head>
    <body>
        <section id="hero">
        <h1 id="h1-registro"> registrate con nosotros </h1>
        </section>
      <section id="formulario-unirse">
      <h2>¿Quieres estar informado?</h2>
      <p>Puedes registrarte y recibir notificaciones y novedades por correo electrónico.</p>

      <form id="formulario" class="formulario" novalidate>
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" placeholder="Tu nombre">
        </div>

        <div class="form-group">
          <label for="apellidos">Apellidos</label>
          <input id="apellidos" type="text" placeholder="Tus apellidos">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="correo@dominio.com">
        </div>

        <label class="check-container">
          <input id="condiciones" type="checkbox">
          <span>Acepto las condiciones</span>
        </label>

        <div id="mensajes"></div>
        <button type="submit">Enviar</button>
</form>
        </section>
        </body>
</html>
